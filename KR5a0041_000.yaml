body:
  text: 混極未判章第一厥初一混肇於未形包含而萬有潜冥蒙昧而三因隱忒似氣非氣若象無象塊然如不物非物之狀朴矣於似類遠類之儀四極內括三才中含利刀不可以力剖巨棒未能以箠攻太清三境若芥子藏之而不露人道萬彚如恆沙而莫數氣類含胞形同雞卵以之內分兩儀乾坤何在以之中包五氣水本何生沙內之金石中之玉不假一鑿一洗何由得分也故朴散則太極開形具則萬象有其為大也若是其為廣也若是其為深也若是其為潜也若是其曰道也乃含真也訣曰無形無象無臭無聲天地未判我何以名冥如在璞混然一寧如此妙用兹道之程朴散分形章第二渾淪凝靄之未鑿動靜隂陽之俱泯欲升者未得其升將聲者未得於聲惶之含蠢蠢以包惺莫能指也氤氤乎如煙重之晦嵐氳氤兮若霧冥而籠水此混者乃隂欲散而陽欲揚此極者乃陽將暢而隂欲分故不混極難以生化冥於道者以默而參之蠢丑江切訣曰二氣混淪三才未分中含萬有欲開未形非極不化無動不寧生化化生開扃闔扃一氣分三章第三氣凝而結既結則混混而不分分之在中養之清者其氣升沈之濁者其氣墜均之不偏者孕於中故中在極之化化以極而分如投水於烈熖之中若割卵於利刀之下氣之一散升清氣運蕩隨清而化清者陽也曰天墜濁氣滯厚隨濁而凝濁者隂也曰地上以乾十日之極而至陽能健者是也下以坤十二辰之極而至隂能化者是也二氣既剖何者為人清乃天之祖濁乃地之源秀在乎中發之於類即類成象始有含靈人道兆也欲明二氣之始人道之初宜於中而求之訣曰一氣始判二儀具生中有人道包含萬靈我同天地何其自分道化在此歸之以明氣開象兆章第四始一生三因三成四即四分五一生三者天地人三成四者東西南北五之生者金木水火土也何謂以水為一也蓋自極未分其體純隂散而化氣故氣即生氣氣而有人氣氣而化者水也其生於木其化於火其歸於土乃當來墜之氣也故養生於金也金者乃五氣之極至此不能反復化為雨露霜雪亦當來水之意也故五氣終絶顛倒推之以金為水之母以土為水之父以火為水之祖何也日之有波月之有曜者是也於五氣之論以水為初為腎者何也人在胎胞如混淪未分之間却以土一火二者又何也故嬰兒一生天門便聞地戶常塞三歲始言生於賢也又非水一木二金三火四者抑何也修真者宜於反觀之故隂符之指悉居此也訣曰一氣既散天地人存五行四極水木之論居腹有息混混淪淪消息此意乃上道門萬象含化章第五二氣既化隨清者運濁者動故氣有升降類有生旺物有榮枯事有代謝五氣各居於一也居東者則曰青陽居西者則曰白藏居南者則曰朱明居北者則曰玄英以散而聚以歸而一故中極為央也此於四氣四節四方各以三月之氣而包含土也然根於土生於木滋於水凋於金而枯於火殺殺之不絶絶之復生者以四時各含於土也春有黃花乃木含土辰支有也夏長黃花乃火含土午支有也秋迸黃花乃金含土申支有也冬發黃卉乃水含土亥支有也五行五氣五象五方無包不成無含不化東方寅為木却為火之生西方金在巳却亦火之餘以水之局則中舍火土以火之局中包上之氣相生相尅悉包悉化故一核二芽三甲四葉五枝六輪七花八果九實十凋即天一地二天三地四天五地六天七地八天九地十也道之以一氣當守一自一至十皆包含之中而存不言之化故太一含真是也修真之士體此而行之訣曰自一生三萬象中含天地中運隂陽密旋一㸃祖氣四時行焉如能會得造化齊肩因虛化實章第六浮游之無祖虛無之有源皆自一氣之散五氣之值也上之虛乃清氣之化則名曰寥廓下之實乃濁氣而生則名曰嶽瀆也故因虛者乃有陽存焉因實者乃者隂存焉故子為虛午為實也午之氣乃隂而火旺於此則實也子之氣乃陽而水旺於此則虛也無虛則不知實無實則不明虛然土為實也何十二時不露也氣為虛也何三清之境化焉以虛求實則易以實求虛則難也虛之於天有風有南有霜有霧有靄則或聚或散乃虛實之始也以地之實則有山有海有林有稼何海竭江涸山顛土震此虛實之感也因無化有者虛之實即有化無者乃實之虛始自父母情性之所感終成形貌凛然此乃虛之實也及其五欲萌一真散復求其情性之元不可得也此虛求實易實求虛之難也故學道之士以先天為基者正合此也訣曰因虛成氣即氣化類實自類生纍因實憊虛裹求實雖難即在實有太實水火不壞性情化育章第七氣既一分象隨此明故居其穹者則曰日月星風雷電隱其下者則曰山川草本禽蟲之類始之無性因動而感故有情也情之一動性復隨焉在草木則感秀在淵瀆則感氣皆從隂而生於陽也既有性則有欲既有欲則生情故草木當日至則性成也栁復為栁花再成花昆蟲蠢動者即動而化皆自日至之所肇也日至者乃冬日之至也冬日者即子也子者乃一陽之始也在卦曰復復者返也然後天地萬物之性情從兹而通也萬物既如此人性情自何有也緣人之自頂至踵一身骨毛氣血動靜開闔皆同天地萬物也故從虛情而感實性也然後一入此情即隨此性感而化有血有珠有魂有胎故曰妊也乃水之一也故生陽者隂也非陽生隂也道之為用能以情性作大藥者乃善於道也如此則天地萬物之情父母未育之性若開鑑以照容朗然可目也訣曰厥初一氣分成性情散之轉晦斂之則生三才本一何立外程但求感合體自圓明日月星氣章第八純陽之氣升於左純隂之氣降於右中孕之氣懸於正乾之一化化以十日是太陽又曰獨陽豈成造化故九日沈之一日浴之九既降下則成六六者方生隂也故月之光有藉於日之華也須彌之外寥霄之左匝右旋月常不及日者蓋獨純隂之故也乾有日秀坤有月之孕者乃隂存陽陽戀隂也日有出沒升髙始出地發於水升於空照於象只能昱晝不能明夕也月有晦朔弦望圓闕生沈者即當來藉陽之故每多不足故所行遲而速匝匝於三十不能益於朝朝爾此日月之道也何大光大曄明於外燭於物不能透於覆盆何也以其無隙也隙者乃開化也開化萬象星也星者亦自日之生也下應於人日秖能轉於陽月秖善旋於隂斡遷四序代謝五行運齊七政者星也然星之應有不定不一易變之道故以斗統之也星可妄移斗不可茍動日夕之懸朗朗於天故其莫敵於日者蓋亦餘氣也然日月有常星無常者是也元始一判天地人分日月星兆也三氣混合復歸於一乃先天之道也訣曰乾有大晶月生大靈上下孕秀其中作星天主陽化地主隂衡三才一氣本之化生默參順體章第九始於情感遂墮此中恭諾之下男女成形來從五氣中秉二儀故未育未生之前居母腹中飮血受胞以手掩其目以兩足拳於頷母之一吸子亦吸之母之一吐子亦吐之凡百動蕩內外相感何識何知何明何曉天之氣混之地之氣混之人之氣亦混之但有一息存焉及其分育天翻地覆人驚胞破如行大山顛失足之狀頭懸足撑而出之大呌一聲其息即忘故隨性隨情不可俱也胎之一息元復再守也況乳以沃其心巧以玩其目愛以牽其情欲以使其神如此漸漸有茫茫之隔釁釁之端無復守胎之一息也學道之士當味此章以求其要耳訣曰始於混沌中成胎孕七情六欲歸于一定出入呼吸當來真性胎息胎息道中玄牝甲庚應數章第十乾之千首於甲坤之合應於庚甲自水之生故居於東庚乃水之母故育於西西者雖言於肅而申中有水土也故西庚之殺而生於東甲以其甲之氣在於寅亦曰三陽甲之三日甲之三日分於後先庚之三日庚之三日次於始末者緣甲之合者巳巳中有土故也三陽交泰是也庚之所合者乙中有木木中有火火可伏庚不妨於水也聖道之妙以甲居子乃印印者正也正者始也緣子下有水水能生木故甲子為首至戌為終蓋戌乃火之庫也甲必云庚者水之母緣申中有土能生於金至辰巳則絶緣有火之殺也故善於道者以甲子甲辰甲午三日之先氣用庚子庚辰庚午之先合凝然養息自子至丑從丑至寅心無一毫之染身如鐡壁調其氣而平其息則天之干地之合我之感一時俱孚三才三因之道入目自足耳訣曰三甲與三庚後先生殺存以時加此日天地氣俱行無想亦無妄綿綿息息平周天消息近圓皎坐中生存息養真章第十一天之有竅而生風地之有竅而生水蓋天竅不可明而地竅易可窺竅之一開風從生竅之一閉氣從塞天地之竅乃萬象化生無窮之奧也天地能以竅而開亦能以竅而息息則地氣可升天氣可降也自子則天竅開其氣清而降自午則地竅塞其氣濁而升故動蕩皆歸於橐籥也橐籥者一開一闔之謂也天以子為橐地以午為籥人以息而總晝夜推之一萬三千六百有餘即乾坤之數也善於道者能存於息明於竅者真不勞而養也訣曰四鼓天地交而演方見韜水火自然事不須以意勞鼻中有兩竅天地不差毫能於此時存明月掌中撈得一成道章第十二一者萬象之祖氣天地之根原人心之大要也乾一而成數地一而成秀人一而定情蓋不能齊之以一而散之於萬蝟之中而混塞其心不可見其本原也天一則清地一則寧人一則德馨身一則正家一則齊內一則不惑外一則順心一則隂陽和念一則邪僻遠性一則情不生氣一則息自平息一則水火交天地泰其可不一哉訣曰一者道之氣氣乃一之源人能求清淨但去一中尋不覺朝夕間忽見水中金得一後忘一神存真可侵得象無象章第十三道不無言亦不可泥言因氣成象得氣則象者形諸類也殊不知因氣成類即類成象篇章之下巧於發辭不若指於實要明於物象視於變通然變通有道篇章存辭故曰善者未常辨辨者皆不善若井中之魚孰可以窺之哉欲知水之樂當問於魚哉此之謂也訣曰始入未明象見象方知意識象是引門何必以言泥一泥轉忘初撑舟不逺地不知癡俚人却乃道中諦育神團氣章第十四養神者必先養心鍊氣者宜於平息故神自心有心乃神舍氣即息源息因氣使善養於心者必使皎之如清淵印月靜之若空谷無聲然後內境不動外塵不干念如一鐡之沈波性如太虛之無著淨靜淵默物我兩忘神之自清氣之自團也神即氣而凝氣戀神而住於此之時不知其息之出入耳訣曰始因其息終得乎氣氣息自守我物俱棄動靜兩忘神之方住秖在養心一絲勿起神化出入章第十五神之為用非為造作始自養心之有終於存氣而生如清波之照影若明鏡之對容也以有心求之終莫之有以無心求之愈見其無若何可也蓋神貴不撓心尚不思守之如石行之如愚口無言而耳無聼念不起而性不流如濁漿之初澄自然清於上而滓於下風不生而葉自停亦不知天地如何亦不知我為甚物既入於溟漠之中即居混沌之所如太極之未分三才之未露忽然一靈光自朗如虛室生白之狀此皆無心中有非有心之可為也故出入無方變化隨寓矣訣曰道以非名道心皆忘自心一時俱不識方見谷中聲水火非為事隂陽在我生坐中存溟涬神化悉皆經破惑守一章第十六道之於物物之於道始於忘象有三千六百之小門而生八萬四千之大惑往往速於求異稽於造真千人萬人之進學無一無半之成道以其惑之守也不明其的也人皆以龍虎為首非也以金丹赤藥非也以鳳髓鴉神非也以玉蘂金花非也以朱鉛黑汞非也以心腎為水火非也以脾土肝木非也以吞津納氣非也以朝日採月非也以嚅山嘯林漱泉卧石日以咽霞夕以瞻斗俱非也每每學者不思其祖而求其孫不知太極未肇人物未分之前還有如是之類乎大要之用百千萬億之人未嘗守之豈不惑之又惑迷之轉迷哉訣曰龍虎非為道吞津不是功丹霞非採日神化不歸風祖氣誰曽識真宗孰可窮須臾端的事三界悉皆通無水無火章第十七太極以氣而包萬象天地以氣而分清濁始以氣結終以氣化為之散漫各隨其方故居西者為金類所感水之一字乃天地本原之氣火之一字亦乾坤育化之氣故因無形而為有形冬則伏夏則舒入之陽出之隂潜之隂暢之陽人之氣乃氣之原故學道者以氣化氣即氣存氣噓呵抽加則變化而有也以水為水非道也以火為火亦非道也如以氣存氣者則為水火也水火者乃以無化有也初無分别旦暮晨昏出入之意方是也故善於道者以氣守一以氣養氣則水自內升火自裹降初何示之於外也不可不深省知訣曰一氣隂陽會金木自然生本來非水火萬象各存真氣氣為初始中間儘化神岸臨無用楫只此坎離因守一生神章第十八天淨則雲氣清地靜則草本靈人能體此行隂會陽合并故一泓之波可以瞻星斗一靈之魂可以知吉凶乃其不散而靜不妄守也往往後學不能掃靈臺之埃而廣喉舌之辨故因語忘氣失氣忘精以巧拙為縱橫以多記為大能故純一之氣失守而隂陽之妙隨失也善修者斂之以靜巧之以拙淨之於念清之於心存之以默示之以朴自然天宇清地軸寧氣抱一神自靈然後不符而可符不呪而可囑無神而神衛邪之走怪之潜家宅寧人事和以默之墨以馘不正之祟此真元至一之氣為守一抱元之要也何假分龍虎别龜蛇哉訣曰念念念丹田收之守在堅五色無心著中間自有天不須求水火金鼎內烹煎朝朝與暮暮神氣錬丹田神氣成胎章第十九心中有神氣內存氣心若撓而神不清氣若耗而氣必憊以之出於頂不如守神於舍以之吐氣留真莫若養氣存氣神乃氣之化氣無神不留故神氣如子母如天地不可一刻離也善於行者以氣內固固者非做造而固也綿綿於息其氣自凝氣凝息平其神自住始坐如小兒入寢久之如困夫之入擔自腿至臍自腰以上不求也心則微沖氣則如絶當此之時為道者何知其神焉明其化孰知有胎胎者非産男女之胎也乃元也要在𢬵一死於洪崖忘一身如草木死一心如冷灰不知我不知身少頃風聲雨意一定之後息巳無矣氣自固也神自靈也胎自結也若以夕靜如是晝雜如何但味訣偈咸自了之訣曰我用不用我靈臺淨裸裸念念在丹田隨心也放下目耳絶視聼有口却如啞一㸃若太虛任你之乎者修德濟物章第二十仁者德之本德乃道之基不仁者不足以言道無德者不可與談化往往修者首務長生以求不死殊不明長生不死者何物也止以有為而先於人以巧飾而詐於已無山林之清而樂山林之事無利益之念而求上天之鶴善之未有惡巳先彰如持念珠而興訟設醮事以撻人此等之人俱不足與言道也能於事者見人之危而救之見人困而濟之見人之陷而提之見人之疾如巳之疾見人之不善而化之見人之美女不起私之見人之奉真如巳之奉之入道則行道見業則去業然後儉於已而厚於衆無內外不和之事有尊敬父母之心清淡於已豐利於人人之如此以之求具則真感以之修道則道成又且益子孫而超九祖豈不美哉訣曰道本德中來有德方知道天地大德生聖賢亦此造長生一徑真不死者乃道道德與性命四字甚分曉尊師謝祖章第二十一極未判無以見天地三才之氣道不立何以明父母萬類之因是以有本則有末有源必有流太上不以化開道老君不設教鳥能識奉儀有道無緣見道則遠有緣無師遇道不明廣獵丹書不如求之於訣多參異人不如守之於我故指之者迷也化之者正也行之者道也故祖不可忘而師不可怠祖之積也則子孫昌師不明則本源晦道專之以德尊之以祖敬之於師不可一日而去也訣曰一氣道之祖一言道之師祖氣不可遠道言朝夕知子孫逢遇此父母隂德為無以自已思當知在祖禰巳得不得章第二十二未游滄海則不明風濤之險已登泰嶽則方敬峯巔之危始也忽之易終也行之難道包天地人括三才終日茫茫不明其奧及其入也皆曰雲霄之上必可居也淵瀆之深必可造也此小優之守枝坎蛙之水也夫道之大者莫可量道之微者孰能探區區之泄五章盡也不必走山林尋奇特不必索經書訪異友天地一壷道德庶類悉備此經今既已知巳得常如不及日如未得無輕後進無忽後學無慢諸經無忘祖本道尚强名莫言巳得者是為得道實之無得方曰永得也訣曰慕念如渴思求朝夕既真骨緣遇其道德心常不及斯為至得當戒滿盈恐返折尅濟生度死章第二十三道之化化以德德生誠誠化敬敬之一出百神衛之故存之有神是曰衛也養之有氣故曰真也一噓之可以為慶雲一呵之可以為雨露運之可以為南昌錬度化之可以拔久潜幽凝非符非呪非神非將非去非來也乃一氣一心一默一守一道一德一我也以之濟生則疾愈以之度死則死化如此之大非道何也如此之尊當切守之當切行之訣曰念即是道道即為符鬼邪潜走幽壤咸蘇默醮在我上蒼自孚濟度二事如拳展舒大經圓滿章第二十四功之行德之修道之用經之旨可以明三界可以通五行可以超九祖可以化萬類者此經也此經之下者凡今三也一經甲申而歸於大波以溺而不出二自丁酉化於烈焰而煨之也以後復降其辭别其理泯若一土之比玉也雖云復降亦為漂焚者久今日復下者以奉敬之情尊樂之大故以批于子之家庭宜當遵之守之寶之敬之功行道德若之圓備可以升之無對非人而慢示之愆報非常戒律不淺矣訣曰祖先素有德故得奉真道真下道巳敷始終歸子造功在於勤修德在於慈孝道德圓滿時一門吉之妙太上修真體元妙道經此經乃北極雷嶽教主金闕化身元素真君憫念群生之多迷真性未悟靈門降筆于奉道劉元瑞家欲廣其傳流行教法元瑞不明聖意乃以降靈真本獻竒於文魁逹貴袐藏于韞匱之中未得闡揚玄奧今劉元瑞既沒之後其家所藏謄本正觀得而寶之鋟諸梓木印行于世庶使學道修真之士開明妙理了悟此因正觀尚慮當來謄真之時天書草聖俗意難明其中若有字樣差訛或誤加增損惟待通明之士改而證諸不亦宜乎峕景定歲次辛酉季夏月吉辰奉道弟子董正觀謹識
