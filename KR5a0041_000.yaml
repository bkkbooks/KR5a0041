front:
  text: 太上修眞體元妙道經辰七道本无言亦无其名天本不語萬象旋焉始自虚无中含妙一自三炁之内融後二儀之分判三炁者元初元始元極也不極則无變无變則无象象者群類之本萬物之所由也而化四極四極之分而天地四方隂陽寒暑榮枯代謝隨類而消長也故五行之炁以一炁化水而生水木生火火生土土生金也而生生化化之道從兹而有既有之後必曰无无有有无之數而生旺休囚沈潜隱顯而有以滋之滋之既深則生炁非炁也炁既一生則三才始肇而人居其中始也於一炁終也散萬化故情性喜怒好惡隨蔓而枝也則曰父母夫婦男女始極終化即類成象起於混一散於萬有豈非其道也哉
